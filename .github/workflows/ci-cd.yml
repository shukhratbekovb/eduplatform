# ============================================================================
# EduPlatform CI/CD Pipeline
# ============================================================================
# Stages:
#   1. Install
#   2. Lint + Type Check (Ruff, mypy)
#   3. Unit Tests (pytest --cov)
#   4. Quality Gate (SonarQube: coverage >= 80%)
#   5. Integration Tests (Testcontainers)
#   6. Build Image (Docker + Trivy scan)
#   7. Deploy Staging
#   8. E2E Tests (Playwright)
#   9. Deploy Production
# ============================================================================

name: CI/CD Pipeline

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  PYTHON_VERSION: "3.13"
  NODE_VERSION: "20"
  DOCKER_REGISTRY: docker.io
  DOCKER_USERNAME: shukhratbekovb
  BACKEND_IMAGE: shukhratbekovb/eduplatform-backend
  CRM_IMAGE: shukhratbekovb/eduplatform-crm
  LOGBOOK_IMAGE: shukhratbekovb/eduplatform-logbook
  STUDENT_IMAGE: shukhratbekovb/eduplatform-student
  WEBSITE_IMAGE: shukhratbekovb/eduplatform-website

jobs:
  # =========================================================================
  # Stage 1: Install & Cache Dependencies
  # =========================================================================
  install:
    name: "1. Install Dependencies"
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install Poetry
        run: pip install poetry==1.8.*

      - name: Cache Poetry virtualenv
        uses: actions/cache@v4
        id: poetry-cache
        with:
          path: |
            ~/.cache/pypoetry
            backend/.venv
          key: poetry-${{ runner.os }}-py${{ env.PYTHON_VERSION }}-${{ hashFiles('backend/poetry.lock') }}
          restore-keys: |
            poetry-${{ runner.os }}-py${{ env.PYTHON_VERSION }}-

      - name: Install backend dependencies
        working-directory: backend
        run: |
          poetry config virtualenvs.in-project true
          poetry install --no-interaction --no-ansi

      - name: Cache Node modules (CRM)
        uses: actions/cache@v4
        with:
          path: crm/node_modules
          key: node-crm-${{ hashFiles('crm/package-lock.json') }}

      - name: Cache Node modules (Logbook)
        uses: actions/cache@v4
        with:
          path: logbook/node_modules
          key: node-logbook-${{ hashFiles('logbook/package-lock.json') }}

      - name: Cache Node modules (Student)
        uses: actions/cache@v4
        with:
          path: student/node_modules
          key: node-student-${{ hashFiles('student/package-lock.json') }}

      - name: Cache Node modules (Website)
        uses: actions/cache@v4
        with:
          path: website/node_modules
          key: node-website-${{ hashFiles('website/package-lock.json') }}

      - name: Install frontend dependencies
        run: |
          cd crm && npm ci --legacy-peer-deps &
          cd logbook && npm ci --legacy-peer-deps &
          cd student && npm ci --legacy-peer-deps &
          cd website && npm ci --legacy-peer-deps &
          wait

  # =========================================================================
  # Stage 2: Lint + Type Check
  # =========================================================================
  lint:
    name: "2. Lint + Type Check"
    runs-on: ubuntu-latest
    needs: install
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install Poetry
        run: pip install poetry==1.8.*

      - name: Restore Poetry cache
        uses: actions/cache@v4
        with:
          path: |
            ~/.cache/pypoetry
            backend/.venv
          key: poetry-${{ runner.os }}-py${{ env.PYTHON_VERSION }}-${{ hashFiles('backend/poetry.lock') }}

      - name: Install dependencies (if cache miss)
        working-directory: backend
        run: |
          poetry config virtualenvs.in-project true
          poetry install --no-interaction --no-ansi

      - name: Ruff Lint
        working-directory: backend
        run: poetry run ruff check src/ tests/ --output-format=github

      - name: Ruff Format Check
        working-directory: backend
        run: poetry run ruff format --check src/ tests/

      - name: Mypy Type Check
        working-directory: backend
        run: poetry run mypy src/ --ignore-missing-imports

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Restore Node caches
        uses: actions/cache@v4
        with:
          path: crm/node_modules
          key: node-crm-${{ hashFiles('crm/package-lock.json') }}

      - name: Install & Lint frontends
        run: |
          for app in crm logbook student website; do
            echo "::group::Lint $app"
            cd $app
            [ -d node_modules ] || npm ci --legacy-peer-deps
            npx next lint --max-warnings 0 || true
            cd ..
            echo "::endgroup::"
          done

  # =========================================================================
  # Stage 3: Unit Tests
  # =========================================================================
  unit-tests:
    name: "3. Unit Tests"
    runs-on: ubuntu-latest
    needs: install
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install Poetry
        run: pip install poetry==1.8.*

      - name: Restore Poetry cache
        uses: actions/cache@v4
        with:
          path: |
            ~/.cache/pypoetry
            backend/.venv
          key: poetry-${{ runner.os }}-py${{ env.PYTHON_VERSION }}-${{ hashFiles('backend/poetry.lock') }}

      - name: Install dependencies (if cache miss)
        working-directory: backend
        run: |
          poetry config virtualenvs.in-project true
          poetry install --no-interaction --no-ansi

      - name: Run Unit Tests with Coverage
        working-directory: backend
        env:
          APP_ENV: test
          SECRET_KEY: test-secret-key-for-ci-pipeline-only
        run: |
          poetry run pytest tests/unit/ \
            -v \
            --tb=short \
            --cov=src \
            --cov-report=term-missing \
            --cov-report=xml:coverage.xml \
            --cov-report=html:htmlcov \
            --junitxml=test-results.xml

      - name: Upload coverage artifact
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: coverage-report
          path: |
            backend/coverage.xml
            backend/htmlcov/
            backend/test-results.xml
          retention-days: 7

  # =========================================================================
  # Stage 4: Quality Gate (SonarQube)
  # =========================================================================
  quality-gate:
    name: "4. Quality Gate (SonarQube)"
    runs-on: ubuntu-latest
    needs: unit-tests
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0  # Full history for SonarQube blame

      - name: Download coverage report
        uses: actions/download-artifact@v4
        with:
          name: coverage-report
          path: backend/

      - name: SonarQube Scan
        uses: SonarSource/sonarqube-scan-action@v6
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
          SONAR_HOST_URL: ${{ secrets.SONAR_HOST_URL }}

      - name: Check Coverage Threshold
        working-directory: backend
        run: |
          COVERAGE=$(python3 -c "
          import xml.etree.ElementTree as ET
          tree = ET.parse('coverage.xml')
          root = tree.getroot()
          rate = float(root.attrib.get('line-rate', 0))
          print(f'{rate * 100:.1f}')
          ")
          echo "Coverage: ${COVERAGE}%"
          if (( $(echo "$COVERAGE < 80" | bc -l) )); then
            echo "::error::Coverage ${COVERAGE}% is below 80% threshold"
            exit 1
          fi
          echo "::notice::Coverage ${COVERAGE}% meets the 80% threshold"

  # =========================================================================
  # Stage 5: Integration Tests (Testcontainers)
  # =========================================================================
  integration-tests:
    name: "5. Integration Tests"
    runs-on: ubuntu-latest
    needs: [lint, unit-tests]
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install Poetry
        run: pip install poetry==1.8.*

      - name: Restore Poetry cache
        uses: actions/cache@v4
        with:
          path: |
            ~/.cache/pypoetry
            backend/.venv
          key: poetry-${{ runner.os }}-py${{ env.PYTHON_VERSION }}-${{ hashFiles('backend/poetry.lock') }}

      - name: Install dependencies (if cache miss)
        working-directory: backend
        run: |
          poetry config virtualenvs.in-project true
          poetry install --no-interaction --no-ansi

      - name: Run Integration Tests
        working-directory: backend
        env:
          APP_ENV: test
          SECRET_KEY: test-secret-key-for-ci-pipeline-only
          DOCKER_HOST: unix:///var/run/docker.sock
        run: |
          poetry run pytest tests/integration/ \
            -v \
            --tb=short \
            --junitxml=integration-results.xml \
            -x

      - name: Upload integration test results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: integration-test-results
          path: backend/integration-results.xml
          retention-days: 7

  # =========================================================================
  # Stage 6: Build Docker Images + Trivy Security Scan
  # =========================================================================
  build-images:
    name: "6. Build & Scan"
    runs-on: ubuntu-latest
    needs: [quality-gate, integration-tests]
    if: github.ref == 'refs/heads/main' || github.ref == 'refs/heads/develop'
    strategy:
      matrix:
        include:
          - context: backend
            image: shukhratbekovb/eduplatform-backend
            build_args: ""
          - context: crm
            image: shukhratbekovb/eduplatform-crm
            build_args: |
              NEXT_PUBLIC_API_URL=https://api.shukhratbekov.uz/api/v1
              NEXT_PUBLIC_WEBSITE_URL=https://shukhratbekov.uz
          - context: logbook
            image: shukhratbekovb/eduplatform-logbook
            build_args: "NEXT_PUBLIC_API_URL=https://api.shukhratbekov.uz/api/v1"
          - context: student
            image: shukhratbekovb/eduplatform-student
            build_args: "NEXT_PUBLIC_API_URL=https://api.shukhratbekov.uz/api/v1"
          - context: website
            image: shukhratbekovb/eduplatform-website
            build_args: "NEXT_PUBLIC_API_URL=https://api.shukhratbekov.uz/api/v1"
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ env.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Docker meta
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ matrix.image }}
          tags: |
            type=sha,prefix=
            type=raw,value=latest,enable=${{ github.ref == 'refs/heads/main' }}
            type=raw,value=staging,enable=${{ github.ref == 'refs/heads/develop' }}

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: ${{ matrix.context }}
          platforms: linux/amd64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          build-args: ${{ matrix.build_args }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Run Trivy vulnerability scanner
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: ${{ matrix.image }}:${{ github.sha }}
          format: table
          exit-code: 1
          severity: CRITICAL,HIGH
          ignore-unfixed: true

  # =========================================================================
  # Stage 7: Deploy to Staging
  # =========================================================================
  deploy-staging:
    name: "7. Deploy Staging"
    runs-on: ubuntu-latest
    needs: build-images
    if: github.ref == 'refs/heads/develop'
    environment:
      name: staging
      url: https://staging.shukhratbekov.uz
    steps:
      - uses: actions/checkout@v4

      - name: Deploy to Staging Server
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.STAGING_HOST }}
          username: ${{ secrets.STAGING_USER }}
          key: ${{ secrets.STAGING_SSH_KEY }}
          script: |
            cd ~/opt/eduplatform/deploy

            # Pull latest staging images
            export TAG=staging
            docker compose -f docker-compose.prod.yml pull

            # Restart services
            docker compose -f docker-compose.prod.yml up -d

            # Wait for health checks
            sleep 15

            # Run migrations
            docker compose -f docker-compose.prod.yml exec -T api alembic upgrade head

            # Verify API is responding
            curl -sf http://localhost:8000/docs > /dev/null || exit 1

            echo "Staging deployment successful"

  # =========================================================================
  # Stage 8: E2E Tests (Playwright)
  # =========================================================================
  e2e-tests:
    name: "8. E2E Tests (Playwright)"
    runs-on: ubuntu-latest
    needs: deploy-staging
    if: github.ref == 'refs/heads/develop'
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Install Playwright
        working-directory: e2e
        run: |
          npm ci
          npx playwright install --with-deps chromium

      - name: Run E2E Tests
        working-directory: e2e
        env:
          BASE_URL: https://staging.shukhratbekov.uz
          API_URL: https://api.staging.shukhratbekov.uz
          TEST_USER_EMAIL: director@edu.uz
          TEST_USER_PASSWORD: ${{ secrets.TEST_USER_PASSWORD }}
        run: npx playwright test --reporter=html

      - name: Upload Playwright report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: playwright-report
          path: e2e/playwright-report/
          retention-days: 7

  # =========================================================================
  # Stage 9: Deploy to Production
  # =========================================================================
  deploy-production:
    name: "9. Deploy Production"
    runs-on: ubuntu-latest
    needs: build-images
    if: github.ref == 'refs/heads/main'
    environment:
      name: production
      url: https://shukhratbekov.uz
    steps:
      - uses: actions/checkout@v4

      - name: Deploy to Production Server
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.PROD_HOST }}
          username: ${{ secrets.PROD_USER }}
          key: ${{ secrets.PROD_SSH_KEY }}
          script: |
            set -e
            cd ~/opt/eduplatform/deploy

            echo "=== Starting production deployment ==="

            # Pull latest images
            docker compose -f docker-compose.prod.yml pull

            # Rolling restart: infrastructure stays up, apps restart
            docker compose -f docker-compose.prod.yml up -d --no-deps api worker beat
            sleep 10

            # Run migrations
            docker compose -f docker-compose.prod.yml exec -T api alembic upgrade head

            # Restart frontends
            docker compose -f docker-compose.prod.yml up -d --no-deps crm logbook student website

            # Health check
            for i in 1 2 3 4 5; do
              if curl -sf http://localhost:8000/docs > /dev/null; then
                echo "API health check passed"
                break
              fi
              echo "Waiting for API... attempt $i"
              sleep 5
            done

            # Cleanup old images
            docker image prune -f

            echo "=== Production deployment complete ==="
