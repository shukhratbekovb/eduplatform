services:

  # ── Infrastructure ────────────────────────────────────────────────────────────

  postgres:
    image: postgres:16-alpine
    restart: always
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-eduplatform}
      POSTGRES_USER: ${POSTGRES_USER:-edu}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-edu} -d ${POSTGRES_DB:-eduplatform}"]
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    restart: always
    command: redis-server --requirepass ${REDIS_PASSWORD}
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD}", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10

  rabbitmq:
    image: rabbitmq:3-management-alpine
    restart: always
    environment:
      RABBITMQ_DEFAULT_USER: ${RABBITMQ_USER:-edu}
      RABBITMQ_DEFAULT_PASS: ${RABBITMQ_PASSWORD}
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "ping"]
      interval: 10s
      timeout: 5s
      retries: 10

  minio:
    image: minio/minio
    restart: always
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-minioadmin}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD}
    volumes:
      - miniodata:/data
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 10s
      timeout: 5s
      retries: 5

  minio-init:
    image: minio/mc
    depends_on:
      minio:
        condition: service_healthy
    restart: "no"
    entrypoint: >
      /bin/sh -c "
        mc alias set local http://minio:9000 ${MINIO_ROOT_USER:-minioadmin} ${MINIO_ROOT_PASSWORD};
        mc mb --ignore-existing local/eduplatform-files;
        mc anonymous set download local/eduplatform-files/avatars;
        echo 'MinIO bucket ready';
      "

  # ── Backend ───────────────────────────────────────────────────────────────────

  api:
    build:
      context: ./backend
      dockerfile: Dockerfile
    restart: always
    command: uvicorn src.main:app --host 0.0.0.0 --port 8000 --workers 4
    volumes:
      - ./backend/gcp_keys.json:/app/gcp_keys.json:ro
    ports:
      - "127.0.0.1:8000:8000"
    env_file: ./.env.backend
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy

  worker:
    build:
      context: ./backend
      dockerfile: Dockerfile
    restart: always
    command: celery -A src.infrastructure.workers.celery_app worker --loglevel=info -Q default,notifications --concurrency=4
    env_file: ./.env.backend
    depends_on:
      rabbitmq:
        condition: service_healthy
      redis:
        condition: service_healthy
      postgres:
        condition: service_healthy

  beat:
    build:
      context: ./backend
      dockerfile: Dockerfile
    restart: always
    command: celery -A src.infrastructure.workers.celery_app beat --loglevel=info
    env_file: ./.env.backend
    depends_on:
      rabbitmq:
        condition: service_healthy

  # ── Frontends ─────────────────────────────────────────────────────────────────

  crm:
    build:
      context: ./crm
      dockerfile: Dockerfile
      args:
        NEXT_PUBLIC_API_URL: https://api.shukhratbekov.uz/api/v1
        NEXT_PUBLIC_WEBSITE_URL: https://shukhratbekov.uz
    restart: always
    ports:
      - "127.0.0.1:3000:3000"

  logbook:
    build:
      context: ./logbook
      dockerfile: Dockerfile
      args:
        NEXT_PUBLIC_API_URL: https://api.shukhratbekov.uz/api/v1
    restart: always
    ports:
      - "127.0.0.1:3001:3000"

  student:
    build:
      context: ./student
      dockerfile: Dockerfile
      args:
        NEXT_PUBLIC_API_URL: https://api.shukhratbekov.uz/api/v1
    restart: always
    ports:
      - "127.0.0.1:3002:3000"

  website:
    build:
      context: ./website
      dockerfile: Dockerfile
      args:
        NEXT_PUBLIC_API_URL: https://api.shukhratbekov.uz/api/v1
    restart: always
    ports:
      - "127.0.0.1:3003:3000"

volumes:
  pgdata:
  miniodata:
