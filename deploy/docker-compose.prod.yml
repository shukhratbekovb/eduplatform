services:

  # ── Infrastructure ────────────────────────────────────────────────────────────

  postgres:
    image: postgres:16-alpine
    restart: always
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-eduplatform}
      POSTGRES_USER: ${POSTGRES_USER:-edu}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-edu} -d ${POSTGRES_DB:-eduplatform}"]
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    restart: always
    command: redis-server --requirepass ${REDIS_PASSWORD}
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD}", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10

  rabbitmq:
    image: rabbitmq:3-management-alpine
    restart: always
    environment:
      RABBITMQ_DEFAULT_USER: ${RABBITMQ_USER:-edu}
      RABBITMQ_DEFAULT_PASS: ${RABBITMQ_PASSWORD}
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "ping"]
      interval: 10s
      timeout: 5s
      retries: 10

  # ── Backend ───────────────────────────────────────────────────────────────────

  api:
    image: shukhratbekovb/eduplatform-backend:latest
    restart: always
    command: uvicorn src.main:app --host 0.0.0.0 --port 8000 --workers 4
    volumes:
      - ./gcp_keys.json:/app/gcp_keys.json:ro
    ports:
      - "127.0.0.1:8000:8000"
    env_file: ./.env.backend
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy

  worker:
    image: shukhratbekovb/eduplatform-backend:latest
    restart: always
    command: celery -A src.infrastructure.workers.celery_app worker --loglevel=info -Q default,notifications --concurrency=4
    env_file: ./.env.backend
    depends_on:
      rabbitmq:
        condition: service_healthy
      redis:
        condition: service_healthy
      postgres:
        condition: service_healthy

  beat:
    image: shukhratbekovb/eduplatform-backend:latest
    restart: always
    command: celery -A src.infrastructure.workers.celery_app beat --loglevel=info
    env_file: ./.env.backend
    depends_on:
      rabbitmq:
        condition: service_healthy

  # ── Frontends ─────────────────────────────────────────────────────────────────

  crm:
    image: shukhratbekovb/eduplatform-crm:latest
    restart: always
    ports:
      - "127.0.0.1:3000:3000"

  logbook:
    image: shukhratbekovb/eduplatform-logbook:latest
    restart: always
    ports:
      - "127.0.0.1:3001:3000"

  student:
    image: shukhratbekovb/eduplatform-student:latest
    restart: always
    ports:
      - "127.0.0.1:3002:3000"

  website:
    image: shukhratbekovb/eduplatform-website:latest
    restart: always
    ports:
      - "127.0.0.1:3003:3000"

volumes:
  pgdata:
