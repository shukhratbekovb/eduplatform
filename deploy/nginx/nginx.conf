user nginx;
worker_processes auto;
error_log /var/log/nginx/error.log warn;
pid /var/run/nginx.pid;

events {
    worker_connections 1024;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    log_format main '$remote_addr - $remote_user [$time_local] "$request" '
                    '$status $body_bytes_sent "$http_referer" '
                    '"$http_user_agent" "$http_x_forwarded_for"';
    access_log /var/log/nginx/access.log main;

    sendfile        on;
    tcp_nopush      on;
    tcp_nodelay     on;
    keepalive_timeout 65;
    types_hash_max_size 2048;
    client_max_body_size 50M;

    # Gzip
    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml application/xml+rss text/javascript image/svg+xml;

    # Security headers
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    # Rate limiting
    limit_req_zone $binary_remote_addr zone=api:10m rate=30r/s;
    limit_req_zone $binary_remote_addr zone=web:10m rate=50r/s;

    # Upstreams
    upstream api_backend {
        server 127.0.0.1:8000;
    }
    upstream crm_frontend {
        server 127.0.0.1:3000;
    }
    upstream lms_frontend {
        server 127.0.0.1:3001;
    }
    upstream student_frontend {
        server 127.0.0.1:3002;
    }
    upstream website_frontend {
        server 127.0.0.1:3003;
    }

    # ── Redirect HTTP → HTTPS ────────────────────────────────────────────
    server {
        listen 80;
        server_name shukhratbekov.uz crm.shukhratbekov.uz lms.shukhratbekov.uz student.shukhratbekov.uz api.shukhratbekov.uz;

        # Let's Encrypt challenge
        location /.well-known/acme-challenge/ {
            root /var/www/certbot;
        }

        location / {
            return 301 https://$host$request_uri;
        }
    }

    # ── Website (main domain) ────────────────────────────────────────────
    server {
        listen 443 ssl http2;
        server_name shukhratbekov.uz;

        ssl_certificate     /etc/letsencrypt/live/shukhratbekov.uz/fullchain.pem;
        ssl_certificate_key /etc/letsencrypt/live/shukhratbekov.uz/privkey.pem;
        include             /etc/nginx/ssl-params.conf;

        limit_req zone=web burst=30 nodelay;

        location / {
            proxy_pass http://website_frontend;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_cache_bypass $http_upgrade;
        }
    }

    # ── API Backend ──────────────────────────────────────────────────────
    server {
        listen 443 ssl http2;
        server_name api.shukhratbekov.uz;

        ssl_certificate     /etc/letsencrypt/live/shukhratbekov.uz/fullchain.pem;
        ssl_certificate_key /etc/letsencrypt/live/shukhratbekov.uz/privkey.pem;
        include             /etc/nginx/ssl-params.conf;

        limit_req zone=api burst=20 nodelay;

        location / {
            proxy_pass http://api_backend;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;

            # CORS handled by FastAPI, not nginx
        }
    }

    # ── CRM ──────────────────────────────────────────────────────────────
    server {
        listen 443 ssl http2;
        server_name crm.shukhratbekov.uz;

        ssl_certificate     /etc/letsencrypt/live/shukhratbekov.uz/fullchain.pem;
        ssl_certificate_key /etc/letsencrypt/live/shukhratbekov.uz/privkey.pem;
        include             /etc/nginx/ssl-params.conf;

        limit_req zone=web burst=30 nodelay;

        location / {
            proxy_pass http://crm_frontend;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_cache_bypass $http_upgrade;
        }
    }

    # ── LMS (Logbook) ────────────────────────────────────────────────────
    server {
        listen 443 ssl http2;
        server_name lms.shukhratbekov.uz;

        ssl_certificate     /etc/letsencrypt/live/shukhratbekov.uz/fullchain.pem;
        ssl_certificate_key /etc/letsencrypt/live/shukhratbekov.uz/privkey.pem;
        include             /etc/nginx/ssl-params.conf;

        limit_req zone=web burst=30 nodelay;

        location / {
            proxy_pass http://lms_frontend;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_cache_bypass $http_upgrade;
        }
    }

    # ── Student Portal ───────────────────────────────────────────────────
    server {
        listen 443 ssl http2;
        server_name student.shukhratbekov.uz;

        ssl_certificate     /etc/letsencrypt/live/shukhratbekov.uz/fullchain.pem;
        ssl_certificate_key /etc/letsencrypt/live/shukhratbekov.uz/privkey.pem;
        include             /etc/nginx/ssl-params.conf;

        limit_req zone=web burst=30 nodelay;

        location / {
            proxy_pass http://student_frontend;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_cache_bypass $http_upgrade;
        }
    }
}
