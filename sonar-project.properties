sonar.projectKey=eduplatform
sonar.projectName=EduPlatform
sonar.projectVersion=1.0

# Sources
sonar.sources=backend/src
sonar.tests=backend/tests
sonar.sourceEncoding=UTF-8

# Python
sonar.python.version=3.13
sonar.python.coverage.reportPaths=backend/coverage.xml

# Exclusions
sonar.exclusions=**/node_modules/**,**/.next/**,**/htmlcov/**,**/__pycache__/**
sonar.coverage.exclusions=**/models/**,**/workers/**,**/ml/**,**/api/**,**/config.py,**/database.py,**/main.py

# Quality Gate
sonar.qualitygate.wait=true
